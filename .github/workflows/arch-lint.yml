name: Arch Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  arch-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Self-test the linter
        run: python3 scripts/ci/test-archlint.py

      - name: Enforce layered layout on the layered Java example
        # Only layered examples obey the layer-folder rule; hexagonal/clean
        # examples use domain/application/adapter and must not be linted here.
        run: |
          python3 scripts/ci/archlint.py layered \
            examples/calculator-java-layered/src/main/java/com/oopforge/example/layered/calculator

      - name: Enforce layered layout on the layered Python example
        run: |
          python3 scripts/ci/archlint.py layered \
            examples/calculator-python-layered/app/calculator

      - name: Enforce CQRS rules on the hexagonal CQRS examples
        run: |
          python3 scripts/ci/archlint.py cqrs \
            examples/calculator-python-hexagonal-cqrs/app
          python3 scripts/ci/archlint.py cqrs \
            examples/calculator-java-hexagonal-cqrs/src/main/java/com/oopforge/example/calculator

      # Second enforcement layer: the industry-standard import-linter on top of
      # the fast stdlib archlint, proving boundaries with a real off-the-shelf tool.
      - name: Enforce import boundaries on the layered Python example (import-linter)
        working-directory: examples/calculator-python-layered
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          lint-imports
