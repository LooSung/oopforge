name: Examples

on:
  push:
    branches:
      - main
    paths:
      - 'examples/**'
      - '.github/workflows/examples.yml'
  pull_request:
    paths:
      - 'examples/**'
      - '.github/workflows/examples.yml'
  schedule:
    # Weekly run catches upstream dependency drift even without example changes.
    - cron: '0 0 * * 1'

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - examples/order-java
          - examples/order-java-layered
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Test
        working-directory: ${{ matrix.dir }}
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - examples/order-python
          - examples/order-python-layered
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ matrix.dir }}/pyproject.toml

      - name: Install and test
        working-directory: ${{ matrix.dir }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest -q
