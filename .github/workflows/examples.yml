name: Examples

on:
  push:
    branches:
      - main
    paths:
      - 'examples/**'
      - '.github/workflows/examples.yml'
  pull_request:
    paths:
      - 'examples/**'
      - '.github/workflows/examples.yml'
  schedule:
    # Weekly run catches upstream dependency drift even without example changes.
    - cron: '0 0 * * 1'

concurrency:
  group: examples-${{ github.ref }}
  cancel-in-progress: true

jobs:
  java:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - examples/calculator-java-layered
          - examples/calculator-java-hexagonal
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Test
        working-directory: ${{ matrix.dir }}
        run: |
          chmod +x ./gradlew
          ./gradlew test --no-daemon

  python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dir:
          - examples/calculator-python-layered
          - examples/calculator-python-hexagonal
          - examples/calculator-python-hexagonal-cqrs
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: ${{ matrix.dir }}/pyproject.toml

      - name: Install and test
        working-directory: ${{ matrix.dir }}
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest -q

  notify-on-cron-failure:
    needs: [java, python]
    # Scheduled runs have no PR/commit surface, so a failure would otherwise go unseen.
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Open issue on scheduled failure
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Scheduled examples build failed ($(date -u +%Y-%m-%d))" \
            --body "The weekly \`examples\` workflow failed, likely from upstream dependency drift (Spring Boot / FastAPI / transitive deps). Investigate and pin or update as needed. Run: ${RUN_URL}"
