name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check shell syntax
        run: |
          bash -n install.sh
          bash -n uninstall.sh
          bash -n doctor.sh
          bash -n bootstrap.sh
          bash -n scripts/lint-skills.sh
          bash -n scripts/smoke-test.sh

      - name: Shellcheck
        run: |
          shellcheck install.sh uninstall.sh doctor.sh bootstrap.sh scripts/lint-skills.sh scripts/smoke-test.sh

      - name: Lint skills and repository
        run: |
          chmod +x scripts/lint-skills.sh
          ./scripts/lint-skills.sh

      - name: Smoke test
        run: |
          chmod +x scripts/smoke-test.sh
          ./scripts/smoke-test.sh
