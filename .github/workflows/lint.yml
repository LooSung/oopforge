name: Lint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Check shell syntax
        run: |
          bash -n scripts/setup/bootstrap.sh
          bash -n scripts/setup/install.sh
          bash -n scripts/setup/uninstall.sh
          bash -n scripts/setup/doctor.sh
          bash -n scripts/setup/lib/common.sh
          bash -n scripts/ci/lint-skills.sh
          bash -n scripts/ci/smoke-test.sh

      - name: Shellcheck
        run: |
          shellcheck scripts/setup/bootstrap.sh \
            scripts/setup/install.sh scripts/setup/uninstall.sh scripts/setup/doctor.sh \
            scripts/setup/lib/common.sh scripts/ci/lint-skills.sh scripts/ci/smoke-test.sh

      - name: Lint skills and repository
        run: |
          chmod +x scripts/ci/lint-skills.sh
          ./scripts/ci/lint-skills.sh

      - name: Self-test proof evaluator
        run: python3 scripts/ci/test-proof-evaluator.py

      - name: Self-test domain review
        run: python3 scripts/ci/test-review.py

      - name: Smoke test
        run: |
          chmod +x scripts/ci/smoke-test.sh scripts/setup/*.sh
          ./scripts/ci/smoke-test.sh
